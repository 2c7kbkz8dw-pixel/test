<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f6ef7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Планнер">
    <title>📋 Планнер</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --accent: #4f6ef7;
            --accent-light: #eef1fe;
            --border: #e5e7eb;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s;
        }
        .container { max-width: 700px; margin:0 auto; }
        [contenteditable]:focus { outline: 2px dashed var(--accent); background: var(--accent-light); border-radius: 6px; }

        .screen { display: none; }
        .screen.active { display: block; }

        /* Главное меню */
        .menu-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .menu-card h2 { margin-bottom: 16px; color: var(--accent); }
        .menu-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .menu-row label { font-weight: 600; font-size:0.9rem; }
        select, input[type="month"], input[type="text"] {
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-family: inherit;
            font-size:0.9rem;
            flex:1;
            min-width: 150px;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size:0.95rem;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }
        .btn-sm { padding: 8px 16px; font-size:0.85rem; }
        .btn-danger { background:#ef4444; color:#fff; border:none; }

        .plan-list { list-style: none; }
        .plan-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            transition: 0.2s;
        }
        .plan-list li:active { background: #f0f4ff; }

        /* Редактор плана */
        .progress {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .circle {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: conic-gradient(#22c55e var(--pct,0%), #e5e7eb 0);
            display: flex; align-items:center; justify-content:center;
            position: relative;
        }
        .circle::after {
            content: '';
            position: absolute;
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--card-bg);
        }
        .circle span { position: relative; z-index:1; font-weight:700; }
        .progress-info h3 { font-size:1rem; margin-bottom:2px; }
        .progress-info p { font-size:0.85rem; color: #666; }
        .reset-btn {
            margin-left: auto;
            background: none;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size:0.85rem;
        }
        .day-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            border-left: 5px solid var(--accent);
            box-shadow: var(--shadow);
        }
        .day-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            justify-content: space-between;
        }
        .day-title {
            font-weight: 700;
            font-size:1.05rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .day-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size:0.9rem;
        }
        .badge {
            font-size:0.75rem;
            background: var(--accent-light);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .completed-all { border-left-color: #22c55e; background: #f0fdf4; }
        .completed-all .badge { background:#d1fae5; color:#059669; }
        .ex-list { list-style:none; }
        .ex-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #f9fafb;
            margin-bottom: 6px;
            border:1px solid transparent;
            transition: 0.2s;
        }
        .ex-item.completed { background:#f0fdf4; border-color:#bbf7d0; }
        .ex-item.completed .ex-name { text-decoration:line-through; color:#999; }
        .ex-name { font-weight:600; font-size:0.9rem; }
        .ex-detail { font-size:0.8rem; color:#666; }
        .checkbox-custom {
            width: 24px; height: 24px;
            border-radius: 6px;
            border:2px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink:0;
            background:#fff;
            transition:0.2s;
            position: relative;
        }
        input[type="checkbox"] {
            position: absolute;
            opacity:0;
            width: 24px; height: 24px;
            cursor: pointer;
            z-index:1;
        }
        input:checked + .checkbox-custom {
            background:#22c55e;
            border-color:#22c55e;
        }
        .checkbox-custom::after {
            content:'✓';
            color:white;
            font-size:14px;
            opacity:0;
        }
        input:checked + .checkbox-custom::after { opacity:1; }
        .delete-btn {
            margin-left: auto;
            background:none;
            border:none;
            font-size:1.2rem;
            color:#ccc;
            cursor:pointer;
            padding:4px 8px;
        }
        .edit-hint { font-size:0.7rem; color:#aaa; margin-top:6px; }
        .add-ex-row { display: flex; gap: 8px; margin-top: 10px; }
        .add-ex-row input {
            flex:1;
            padding: 8px 12px;
            border-radius: 20px;
            border:1px solid #ddd;
            font-size:0.85rem;
            background:#fafafa;
        }
        .add-btn {
            background: var(--accent);
            color:#fff;
            border:none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight:600;
            font-size:0.85rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .back-btn { margin: 16px 0; }

        /* Модальные окна */
        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items:center; justify-content:center;
            z-index: 10;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .color-swatch {
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            display: inline-block;
        }
        .color-swatch.active { border-color: #333; }
        .bg-swatch {
            width: 40px; height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #ccc;
            margin-right: 8px;
            display: inline-block;
        }
        .swatch-group { margin: 16px 0; }
        .direction-list-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ЭКРАН МЕНЮ -->
    <div id="menuScreen" class="screen active">
        <div class="menu-card">
            <h2 contenteditable="true" id="menuTitle">📋 Мой планнер</h2>
            <p class="subtitle" contenteditable="true" id="menuSubtitle">Выберите направление и месяц</p>
            <div class="menu-row">
                <label>Направление:</label>
                <select id="directionSelect"></select>
                <button class="btn btn-sm btn-outline" id="editThemeBtn">🎨 Тема</button>
                <button class="btn btn-sm btn-outline" id="renameDirectionBtn">✏️</button>
            </div>
            <div class="menu-row">
                <button class="btn btn-sm" id="addDirectionBtn">➕ Новое направление</button>
            </div>
            <div class="menu-row">
                <label>Месяц:</label>
                <input type="month" id="monthInput">
            </div>
            <button class="btn" id="openPlanBtn">📂 Открыть план</button>
            <button class="btn btn-outline btn-sm" id="createNewPlanBtn" style="margin-left:8px;">➕ Новый план</button>
        </div>

        <div class="menu-card">
            <h3>📌 Существующие планы</h3>
            <ul id="existingPlansList" class="plan-list"></ul>
        </div>
    </div>

    <!-- ЭКРАН РЕДАКТОРА ПЛАНА -->
    <div id="planScreen" class="screen">
        <button class="btn btn-outline back-btn" id="backToMenuBtn">← Назад в меню</button>
        <h1 contenteditable="true" id="planTitle">План</h1>
        <p class="subtitle" contenteditable="true" id="planSubtitle"></p>
        <div class="progress">
            <div class="circle" id="progressCircle"><span id="progressPercent">0%</span></div>
            <div class="progress-info">
                <h3>Общий прогресс</h3>
                <p id="progressDetails">0 из 0</p>
            </div>
            <button class="reset-btn" id="resetBtn">↺ Сброс</button>
        </div>
        <div id="daysContainer"></div>
        <button class="btn add-day-btn" id="addDayBtn" style="width:100%;">➕ Добавить день</button>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ТЕМЫ -->
    <div id="themeModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>🎨 Тема для направления</h3>
            <p id="themeDirectionName"></p>
            <div class="swatch-group">
                <label>Фон:</label>
                <div id="bgSwatches"></div>
            </div>
            <div class="swatch-group">
                <label>Акцент:</label>
                <div id="accentSwatches"></div>
            </div>
            <button class="btn" id="applyThemeBtn">Применить</button>
            <button class="btn btn-outline" id="closeThemeBtn">Закрыть</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ/ПЕРЕИМЕНОВАНИЯ НАПРАВЛЕНИЯ -->
    <div id="directionModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="directionModalTitle">Новое направление</h3>
            <input type="text" id="directionNameInput" placeholder="Название" maxlength="30">
            <input type="text" id="directionEmojiInput" placeholder="Эмодзи (например, 🎯)" maxlength="4" style="width:80px;">
            <div class="menu-row" style="justify-content:center; margin-top:16px;">
                <button class="btn" id="saveDirectionBtn">Сохранить</button>
                <button class="btn btn-outline" id="cancelDirectionBtn">Отмена</button>
            </div>
            <p style="color:#ef4444; margin-top:8px; display:none;" id="directionError">Название не может быть пустым</p>
        </div>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}
</script>

<script>
(function() {
    const STORAGE_PREFIX = 'planner_';
    const DIRECTIONS_KEY = 'planner_directions';

    // --- Направления ---
    let directions = [];
    const defaultDirections = [
        { id: 'training', name: '🏋️ Тренировки', emoji: '🏋️' },
        { id: 'study', name: '📚 Учёба', emoji: '📚' }
    ];

    function loadDirections() {
        const saved = localStorage.getItem(DIRECTIONS_KEY);
        if (saved) {
            try {
                directions = JSON.parse(saved);
                if (!Array.isArray(directions) || directions.length === 0) throw new Error();
            } catch(e) {
                directions = [...defaultDirections];
            }
        } else {
            directions = [...defaultDirections];
        }
    }

    function saveDirections() {
        localStorage.setItem(DIRECTIONS_KEY, JSON.stringify(directions));
    }

    function getDirectionById(id) {
        return directions.find(d => d.id === id);
    }

    function getDirectionNameById(id) {
        const dir = getDirectionById(id);
        return dir ? dir.name : id;
    }

    // --- Темы для направлений ---
    function getThemeBg(directionId) {
        return localStorage.getItem(`theme_bg_${directionId}`) || '#f4f6f9';
    }
    function setThemeBg(directionId, color) {
        localStorage.setItem(`theme_bg_${directionId}`, color);
    }
    function getThemeAccent(directionId) {
        return localStorage.getItem(`theme_accent_${directionId}`) || '#4f6ef7';
    }
    function setThemeAccent(directionId, color) {
        localStorage.setItem(`theme_accent_${directionId}`, color);
    }

    // Глобальное применение темы
    function applyTheme(theme) {
        document.documentElement.style.setProperty('--bg', theme.bg);
        document.documentElement.style.setProperty('--accent', theme.accent);
        document.documentElement.style.setProperty('--accent-light', theme.accent + '20');
        document.querySelector('meta[name="theme-color"]').content = theme.accent;
    }

    // Текущее выбранное направление (id)
    let currentDirectionId = 'training';

    // Применяем тему текущего направления
    function applyCurrentTheme() {
        applyTheme({ bg: getThemeBg(currentDirectionId), accent: getThemeAccent(currentDirectionId) });
    }

    // --- Планы ---
    function loadPlan(directionId, month) {
        const key = STORAGE_PREFIX + directionId + '_' + month;
        const saved = localStorage.getItem(key);
        if (saved) {
            try { return JSON.parse(saved); } catch(e) {}
        }
        const dir = getDirectionById(directionId);
        const defaultPlan = {
            id: Date.now().toString(36),
            direction: directionId,
            month: month,
            name: (dir ? dir.name : 'План') + ' — ' + month,
            exercises: [
                { id:'d1', name:'День 1', color:'#4f6ef7', items:[
                    { id:'e1', name:'Задача', detail:'', completed:false }
                ]}
            ]
        };
        return defaultPlan;
    }

    function savePlan(plan) {
        const key = STORAGE_PREFIX + plan.direction + '_' + plan.month;
        localStorage.setItem(key, JSON.stringify(plan));
    }

    function deletePlan(plan) {
        const key = STORAGE_PREFIX + plan.direction + '_' + plan.month;
        localStorage.removeItem(key);
    }

    function getAllPlans() {
        const plans = [];
        for (let i=0; i<localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith(STORAGE_PREFIX)) {
                const parts = key.substring(STORAGE_PREFIX.length).split('_');
                if (parts.length === 2) {
                    const [dirId, month] = parts;
                    const data = JSON.parse(localStorage.getItem(key));
                    data.direction = dirId;
                    data.month = month;
                    plans.push(data);
                }
            }
        }
        return plans;
    }

    // --- UI ---
    const menuScreen = document.getElementById('menuScreen');
    const planScreen = document.getElementById('planScreen');
    const directionSelect = document.getElementById('directionSelect');
    const monthInput = document.getElementById('monthInput');
    const openPlanBtn = document.getElementById('openPlanBtn');
    const createNewPlanBtn = document.getElementById('createNewPlanBtn');
    const existingPlansList = document.getElementById('existingPlansList');
    const backToMenuBtn = document.getElementById('backToMenuBtn');
    const planTitle = document.getElementById('planTitle');
    const planSubtitle = document.getElementById('planSubtitle');
    const daysContainer = document.getElementById('daysContainer');
    const progressCircle = document.getElementById('progressCircle');
    const progressPercent = document.getElementById('progressPercent');
    const progressDetails = document.getElementById('progressDetails');
    const resetBtn = document.getElementById('resetBtn');
    const addDayBtn = document.getElementById('addDayBtn');
    const themeModal = document.getElementById('themeModal');
    const bgSwatches = document.getElementById('bgSwatches');
    const accentSwatches = document.getElementById('accentSwatches');
    const applyThemeBtn = document.getElementById('applyThemeBtn');
    const closeThemeBtn = document.getElementById('closeThemeBtn');
    const themeDirectionName = document.getElementById('themeDirectionName');
    const directionModal = document.getElementById('directionModal');
    const directionModalTitle = document.getElementById('directionModalTitle');
    const directionNameInput = document.getElementById('directionNameInput');
    const directionEmojiInput = document.getElementById('directionEmojiInput');
    const saveDirectionBtn = document.getElementById('saveDirectionBtn');
    const cancelDirectionBtn = document.getElementById('cancelDirectionBtn');
    const directionError = document.getElementById('directionError');
    const editThemeBtn = document.getElementById('editThemeBtn');
    const renameDirectionBtn = document.getElementById('renameDirectionBtn');
    const addDirectionBtn = document.getElementById('addDirectionBtn');

    let editingDirectionId = null; // Для переименования

    function showScreen(screen) {
        menuScreen.classList.remove('active');
        planScreen.classList.remove('active');
        screen.classList.add('active');
    }

    function updateDirectionSelect() {
        directionSelect.innerHTML = '';
        directions.forEach(dir => {
            const opt = document.createElement('option');
            opt.value = dir.id;
            opt.textContent = dir.name;
            directionSelect.appendChild(opt);
        });
        directionSelect.value = currentDirectionId;
    }

    function renderExistingPlans() {
        const plans = getAllPlans();
        existingPlansList.innerHTML = '';
        if (plans.length === 0) {
            existingPlansList.innerHTML = '<li style="color:#999;">Нет сохранённых планов</li>';
            return;
        }
        plans.forEach(plan => {
            const dirName = getDirectionNameById(plan.direction);
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${plan.name || 'Без названия'} (${dirName}, ${plan.month})</span>
                <div>
                    <button class="btn btn-sm" data-open>Открыть</button>
                    <button class="btn btn-sm" data-delete style="background:#fee2e2; color:#dc2626; margin-left:6px;">Удалить</button>
                </div>
            `;
            li.querySelector('[data-open]').addEventListener('click', () => {
                currentDirectionId = plan.direction;
                directionSelect.value = currentDirectionId;
                monthInput.value = plan.month;
                applyCurrentTheme();
                openPlan(plan);
            });
            li.querySelector('[data-delete]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`Удалить план "${plan.name}"?`)) {
                    deletePlan(plan);
                    renderExistingPlans();
                }
            });
            existingPlansList.appendChild(li);
        });
    }

    // Открытие плана (по данным или новому)
    function openPlan(planData) {
        if (planData) {
            currentPlan = planData;
        } else {
            currentPlan = loadPlan(currentDirectionId, monthInput.value);
        }
        applyCurrentTheme();
        renderPlanEditor();
        showScreen(planScreen);
    }

    let currentPlan = null;

    function renderPlanEditor() {
        if (!currentPlan) return;
        planTitle.textContent = currentPlan.name || 'План';
        const dir = getDirectionById(currentPlan.direction);
        planSubtitle.textContent = (dir ? dir.name : '') + ' — ' + currentPlan.month;
        daysContainer.innerHTML = '';

        currentPlan.exercises.forEach((day, idx) => {
            const allDone = day.items && day.items.length > 0 && day.items.every(e => e.completed);
            const doneCount = day.items ? day.items.filter(e => e.completed).length : 0;

            const card = document.createElement('div');
            card.className = 'day-card' + (allDone ? ' completed-all' : '');
            card.style.setProperty('--day-color', day.color || getThemeAccent(currentDirectionId));
            card.innerHTML = `
                <div class="day-header">
                    <div class="day-title">
                        <div class="day-icon">${idx+1}</div>
                        <span class="day-name-text" contenteditable="true">${escapeHTML(day.name)}</span>
                    </div>
                    <span class="badge">${doneCount}/${day.items.length}</span>
                </div>
                <ul class="ex-list">
                    ${day.items.map((ex, exIdx) => `
                        <li class="ex-item ${ex.completed ? 'completed' : ''}">
                            <label style="display:flex;align-items:center;gap:10px;flex:1;">
                                <input type="checkbox" ${ex.completed ? 'checked' : ''} data-day="${idx}" data-ex="${exIdx}">
                                <span class="checkbox-custom"></span>
                                <span>
                                    <div class="ex-name" contenteditable="true">${escapeHTML(ex.name)}</div>
                                    ${ex.detail ? `<div class="ex-detail" contenteditable="true">${escapeHTML(ex.detail)}</div>` : ''}
                                </span>
                            </label>
                            <button class="delete-btn" data-day="${idx}" data-ex="${exIdx}">✕</button>
                        </li>
                    `).join('')}
                </ul>
                <div class="add-ex-row">
                    <input type="text" class="new-ex-name" placeholder="Название" maxlength="50">
                    <input type="text" class="new-ex-detail" placeholder="Детали" maxlength="30" style="max-width:130px;">
                    <button class="add-btn add-ex-btn" data-day="${idx}">+</button>
                </div>
                <div class="edit-hint">✎ двойной клик для редактирования</div>
            `;

            card.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', function() {
                    const d = this.dataset.day, e = this.dataset.ex;
                    currentPlan.exercises[d].items[e].completed = this.checked;
                    savePlan(currentPlan);
                    renderPlanEditor();
                });
            });
            card.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const d = this.dataset.day, ex = this.dataset.ex;
                    if (currentPlan.exercises[d].items.length <= 1) {
                        if (confirm(`Удалить весь день "${currentPlan.exercises[d].name}"?`)) {
                            currentPlan.exercises.splice(d, 1);
                            savePlan(currentPlan);
                            renderPlanEditor();
                        }
                    } else {
                        currentPlan.exercises[d].items.splice(ex, 1);
                        savePlan(currentPlan);
                        renderPlanEditor();
                    }
                });
            });
            const addBtn = card.querySelector('.add-ex-btn');
            const nameInp = card.querySelector('.new-ex-name');
            const detailInp = card.querySelector('.new-ex-detail');
            addBtn.addEventListener('click', () => {
                const name = nameInp.value.trim();
                if (!name) return;
                currentPlan.exercises[idx].items.push({
                    id: 'e' + Date.now(),
                    name, detail: detailInp.value.trim(), completed: false
                });
                savePlan(currentPlan);
                renderPlanEditor();
            });
            nameInp.addEventListener('keydown', e => { if (e.key==='Enter') addBtn.click(); });
            detailInp.addEventListener('keydown', e => { if (e.key==='Enter') addBtn.click(); });

            daysContainer.appendChild(card);
        });

        updateProgress();
    }

    function updateProgress() {
        let total = 0, done = 0;
        if (currentPlan && currentPlan.exercises) {
            currentPlan.exercises.forEach(day => {
                if (day.items) {
                    total += day.items.length;
                    done += day.items.filter(e => e.completed).length;
                }
            });
        }
        const pct = total ? Math.round(done / total * 100) : 0;
        progressCircle.style.setProperty('--pct', pct + '%');
        progressPercent.textContent = pct + '%';
        progressDetails.textContent = `Выполнено ${done} из ${total}`;
    }

    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Автосохранение при редактировании
    daysContainer.addEventListener('input', () => {
        if (!currentPlan) return;
        const dayCards = document.querySelectorAll('.day-card');
        dayCards.forEach((card, idx) => {
            const nameSpan = card.querySelector('.day-name-text');
            if (nameSpan) currentPlan.exercises[idx].name = nameSpan.textContent.trim();
            const exItems = card.querySelectorAll('.ex-item');
            exItems.forEach((item, exIdx) => {
                const nameEl = item.querySelector('.ex-name');
                const detailEl = item.querySelector('.ex-detail');
                if (nameEl) currentPlan.exercises[idx].items[exIdx].name = nameEl.textContent.trim();
                if (detailEl) currentPlan.exercises[idx].items[exIdx].detail = detailEl.textContent.trim();
            });
        });
        savePlan(currentPlan);
    });

    planTitle.addEventListener('input', () => {
        if (currentPlan) { currentPlan.name = planTitle.textContent; savePlan(currentPlan); }
    });

    addDayBtn.addEventListener('click', () => {
        if (!currentPlan) return;
        currentPlan.exercises.push({
            id: 'd' + Date.now(),
            name: 'Новый день',
            color: getThemeAccent(currentDirectionId),
            items: [{ id: 'e' + Date.now(), name: 'Новое упражнение', detail: '', completed: false }]
        });
        savePlan(currentPlan);
        renderPlanEditor();
    });

    resetBtn.addEventListener('click', () => {
        if (!currentPlan) return;
        if (confirm('Сбросить все отметки?')) {
            currentPlan.exercises.forEach(d => d.items.forEach(e => e.completed = false));
            savePlan(currentPlan);
            renderPlanEditor();
        }
    });

    // Навигация
    backToMenuBtn.addEventListener('click', () => {
        showScreen(menuScreen);
        renderExistingPlans();
    });

    openPlanBtn.addEventListener('click', () => {
        currentDirectionId = directionSelect.value;
        applyCurrentTheme();
        openPlan();
    });

    createNewPlanBtn.addEventListener('click', () => {
        currentDirectionId = directionSelect.value;
        applyCurrentTheme();
        const plan = loadPlan(currentDirectionId, monthInput.value);
        plan.name = (getDirectionById(currentDirectionId)?.name || 'План') + ' — ' + monthInput.value;
        savePlan(plan);
        currentPlan = plan;
        renderPlanEditor();
        showScreen(planScreen);
    });

    // Управление направлениями
    editThemeBtn.addEventListener('click', () => {
        currentDirectionId = directionSelect.value;
        openThemeModal();
    });

    renameDirectionBtn.addEventListener('click', () => {
        editingDirectionId = directionSelect.value;
        const dir = getDirectionById(editingDirectionId);
        directionModalTitle.textContent = 'Переименовать направление';
        directionNameInput.value = dir.name.replace(/[^\p{L}\p{N}\s]/gu, '').trim(); // убираем эмодзи
        directionEmojiInput.value = dir.emoji || '';
        directionError.style.display = 'none';
        directionModal.style.display = 'flex';
    });

    addDirectionBtn.addEventListener('click', () => {
        editingDirectionId = null;
        directionModalTitle.textContent = 'Новое направление';
        directionNameInput.value = '';
        directionEmojiInput.value = '';
        directionError.style.display = 'none';
        directionModal.style.display = 'flex';
    });

    saveDirectionBtn.addEventListener('click', () => {
        const name = directionNameInput.value.trim();
        const emoji = directionEmojiInput.value.trim() || '📌';
        if (!name) {
            directionError.style.display = 'block';
            return;
        }
        if (editingDirectionId) {
            const dir = directions.find(d => d.id === editingDirectionId);
            if (dir) {
                dir.name = emoji + ' ' + name;
                dir.emoji = emoji;
            }
        } else {
            const newId = 'dir_' + Date.now();
            directions.push({ id: newId, name: emoji + ' ' + name, emoji: emoji });
        }
        saveDirections();
        updateDirectionSelect();
        directionSelect.value = editingDirectionId || directions[directions.length-1].id;
        currentDirectionId = directionSelect.value;
        applyCurrentTheme();
        directionModal.style.display = 'none';
        renderExistingPlans();
    });

    cancelDirectionBtn.addEventListener('click', () => {
        directionModal.style.display = 'none';
    });

    // Закрытие модальных окон при клике вне
    window.addEventListener('click', (e) => {
        if (e.target === themeModal) themeModal.style.display = 'none';
        if (e.target === directionModal) directionModal.style.display = 'none';
    });

    // Модальное окно темы
    const bgOptions = ['#f4f6f9', '#ffffff', '#1e293b', '#fef3c7', '#ecfdf5', '#fce7f3'];
    const accentOptions = ['#4f6ef7', '#f59e0b', '#8b5cf6', '#ec4899', '#10b981', '#ef4444', '#6366f1'];

    function openThemeModal() {
        themeDirectionName.textContent = getDirectionById(currentDirectionId)?.name || '';
        renderThemeSwatches();
        themeModal.style.display = 'flex';
    }

    function renderThemeSwatches() {
        const currentBg = getThemeBg(currentDirectionId);
        const currentAccent = getThemeAccent(currentDirectionId);

        bgSwatches.innerHTML = '';
        bgOptions.forEach(color => {
            const div = document.createElement('div');
            div.className = 'bg-swatch' + (currentBg === color ? ' active' : '');
            div.style.background = color;
            div.dataset.color = color;
            div.addEventListener('click', () => {
                document.querySelectorAll('#bgSwatches .bg-swatch').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
            });
            bgSwatches.appendChild(div);
        });

        accentSwatches.innerHTML = '';
        accentOptions.forEach(color => {
            const div = document.createElement('div');
            div.className = 'color-swatch' + (currentAccent === color ? ' active' : '');
            div.style.background = color;
            div.dataset.color = color;
            div.addEventListener('click', () => {
                document.querySelectorAll('#accentSwatches .color-swatch').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
            });
            accentSwatches.appendChild(div);
        });
    }

    applyThemeBtn.addEventListener('click', () => {
        const bgActive = bgSwatches.querySelector('.bg-swatch.active');
        const accentActive = accentSwatches.querySelector('.color-swatch.active');
        if (bgActive) setThemeBg(currentDirectionId, bgActive.dataset.color);
        if (accentActive) setThemeAccent(currentDirectionId, accentActive.dataset.color);
        applyCurrentTheme();
        themeModal.style.display = 'none';
    });

    closeThemeBtn.addEventListener('click', () => {
        themeModal.style.display = 'none';
    });

    // Сохранение заголовков меню
    const menuTitle = document.getElementById('menuTitle');
    const menuSubtitle = document.getElementById('menuSubtitle');
    menuTitle.addEventListener('input', () => localStorage.setItem('menuTitle', menuTitle.textContent));
    menuSubtitle.addEventListener('input', () => localStorage.setItem('menuSubtitle', menuSubtitle.textContent));
    if (localStorage.getItem('menuTitle')) menuTitle.textContent = localStorage.getItem('menuTitle');
    if (localStorage.getItem('menuSubtitle')) menuSubtitle.textContent = localStorage.getItem('menuSubtitle');

    // Инициализация
    loadDirections();
    updateDirectionSelect();
    currentDirectionId = directions[0]?.id || 'training';
    directionSelect.value = currentDirectionId;
    applyCurrentTheme();
    monthInput.value = new Date().toISOString().slice(0,7);
    renderExistingPlans();

    directionSelect.addEventListener('change', () => {
        currentDirectionId = directionSelect.value;
        applyCurrentTheme();
    });

})();
</script>
</body>
</html>
